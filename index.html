<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Công Chúa Nhỏ</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; /* Dùng min-height để tránh lỗi trên thiết bị nhỏ */
            /* Nền loang màu hồng sữa nhẹ nhàng */
            background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Ẩn thanh cuộn của body */
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Cho mọi thứ bắt đầu từ trên xuống */
            width: 95%; /* Tăng độ rộng container cho thoáng */
            max-width: 1200px;
            height: 90vh; /* Container chiếm gần hết chiều cao màn hình */
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- CHỈNH SỬA SIZE KHUNG MÔ HÌNH --- */
        model-viewer { 
            width: 100%; 
            /* SỬA 1: Ép chiều cao khung mô hình lớn lên để chừa chỗ cho camera lùi xa */
            height: 70vh; /* Mô hình chiếm 70% chiều cao màn hình */
            /* SỬA 2: Thêm viền và bóng đổ để xác định rõ khung hình (giống hình 3) */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4); /* Bóng hồng đậm hơn tí cho rõ */
            background-color: rgba(255, 255, 255, 0.5); /* Nền mờ bên trong khung */
            
            /* SỬA 3: Các thuộc tính quan trọng để khắc phục mô hình "tàng hình" */
            --poster-color: transparent; /* Ẩn ảnh chờ */
            --progress-bar-color: #00ff88; /* Màu thanh load hệ thống */
        }

        /* --- CSS CHO LỜI CHÚC (ĐÁNH CHỮ TỪ TỪ) --- */
        .typing-container {
            /* SỬA 4: Tạo khoảng cách hợp lý dưới mô hình */
            margin-top: 30px; 
            width: 100%;
            text-align: center;
            min-height: 120px; /* Tăng chiều cao để không bị nhảy trang */
        }

        .typing-text {
            color: #d88; /* Màu hồng đậm nhẹ nhàng cho chữ */
            font-size: 1.1em; /* Giảm nhẹ size chữ cho tinh tế */
            font-weight: 500;
            line-height: 1.7;
            margin: 0;
            display: inline-block;
            white-space: pre-wrap; /* Giữ xuống hàng */
        }

        /* Con trỏ nhấp nháy tạo cảm giác đang gõ */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: #d88;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* --- CSS CHO THANH LOADING TỰ LÀM (Ẩn đi vì model-viewer có thanh load riêng) --- */
        .custom-progress-bar {
            display: none !important; /* Khóa hẳn thanh load cũ */
        }
    </style>
</head>
<body>

    <div class="container">
        <model-viewer 
            src="model-v4.glb" 
            alt="Mô hình 3D đặc biệt" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1.5"
            exposure="1.2"
            
            /* SỬA 5: CHIÊU QUYẾT ĐỊNH: Ép camera phải lùi ra rất xa để nhìn thấy mô hình to */
            /* Giá trị 'auto auto 200%' nghĩa là lùi camera gấp đôi khoảng cách mặc định */
            camera-orbit="auto auto 200%"
            /* Cho phép zoom ra xa hơn nữa nếu cần */
            min-camera-orbit="auto auto 5%"
            max-camera-orbit="auto auto 500%"
            
            id="my-model">
            
            </model-viewer>

        <div class="typing-container">
            <p id="typing-text" class="typing-text"></p><span class="cursor">|</span>
        </div>
    </div>

    <script>
        const modelViewer = document.querySelector('#my-model');
        const typingTextEl = document.querySelector('#typing-text');
        const cursorEl = document.querySelector('.cursor');

        const message = "Gửi công chúa nhỏ, nhớ giữ sức khỏe cho bản thân đấy, ăn uống đàng hoàng,\ntới kỳ thì nhớ giữ ấm, đừng làm việc nặng giữ sức nhé.\nBất cứ lúc nào cũng có thể gọi tui.\nThương cậu";
        const typingSpeed = 70; 
        let charIndex = 0;

        function startTyping() {
            if (charIndex < message.length) {
                typingTextEl.textContent += message.charAt(charIndex);
                charIndex++;
                setTimeout(startTyping, typingSpeed);
            } else {
                setTimeout(() => {
                    cursorEl.style.display = 'none';
                }, 1000);
            }
        }

        // Bắt đầu gõ chữ ngay khi mô hình load xong
        modelViewer.addEventListener('load', () => {
            setTimeout(startTyping, 1000); // Đợi 1 giây cho ổn định rồi gõ
        });
    </script>

</body>
</html>
