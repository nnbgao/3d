<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trưng bày mô hình 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #2c2c2c; 
            font-family: Arial, sans-serif;
        }
        
        model-viewer { 
            width: 100%; 
            height: 100%; 
            max-width: 1200px; 
            max-height: 900px; 
            --progress-bar-color: transparent; /* Ẩn thanh load mặc định của hệ thống */
        }

        /* --- CSS CHO THANH LOADING --- */
        .progress-bar {
            display: block;
            width: 33%;
            height: 20px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-50%, -50%, 0);
            border-radius: 25px;
            box-shadow: 0px 3px 10px 3px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.9);
            background-color: rgba(0, 0, 0, 0.5);
        }

        .progress-bar.hide {
            display: none; /* Dùng display none để ẩn hẳn khi xong */
        }

        .update-bar {
            background-color: #00ff88; 
            width: 0%;
            height: 100%;
            border-radius: 25px;
            transition: width 0.3s;
        }

        .progress-text {
            position: absolute;
            top: -30px;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="model-v4.glb" 
        alt="Mô hình 3D" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1.5"
        exposure="1.2"
        id="my-model">
        
        <div slot="progress-bar" class="progress-bar">
            <div class="progress-text">Đang tải: 0%</div>
            <div class="update-bar"></div>
        </div>
        
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#my-model');
        const updateBar = document.querySelector('.update-bar');
        const progressText = document.querySelector('.progress-text');
        const progressBar = document.querySelector('.progress-bar');

        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress * 100;
            updateBar.style.width = `${progress}%`;
            progressText.textContent = `Đang tải: ${Math.round(progress)}%`;
            
            if (progress === 100) {
                // Đợi một chút cho mô hình dựng xong rồi mới ẩn thanh load
                setTimeout(() => {
                    progressBar.classList.add('hide');
                }, 500);
            }
        });
    </script>

</body>
</html>
