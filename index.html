<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trưng bày mô hình 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* Tùy chỉnh giao diện trang web */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #2c2c2c; /* Nền tối để làm nổi bật mô hình */
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            max-width: 1200px; /* Chiều rộng tối đa */
            max-height: 900px; /* Chiều cao tối đa */
        }
    </style>
</head>
<body>

    <model-viewer 
        src="model.glb" 
        alt="Mô hình 3D của tôi" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1.5"
        exposure="1.2">
    </model-viewer>

</body>
</html>
