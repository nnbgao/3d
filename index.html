<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Công Chúa Nhỏ</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffe4e1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            position: relative;
        }
        
        /* --- HIỆU ỨNG TRÁI TIM TRÔI LƠ LỬNG --- */
        .heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 20px;
            user-select: none;
            z-index: -1; /* Nằm dưới mô hình và chữ */
            animation: float 10s linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            max-width: 1200px;
            height: 95vh;
            padding: 20px;
            z-index: 1;
        }

        model-viewer { 
            width: 100%; 
            height: 65vh; 
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.5);
            background-color: rgba(255, 255, 255, 0.4);
            --poster-color: transparent;
        }

        .typing-container {
            margin-top: 25px;
            width: 100%;
            text-align: center;
            min-height: 100px;
        }

        .typing-text {
            color: #d88;
            font-size: 1.15em;
            font-weight: 500;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: #d88;
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="heart-spawn"></div>

    <div class="container">
        <model-viewer 
            src="model-v4.glb" 
            alt="Mô hình 3D" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1.5"
            exposure="1.2"
            camera-orbit="auto auto 200%"
            id="my-model">
        </model-viewer>

        <div class="typing-container">
            <p id="typing-text" class="typing-text"></p><span class="cursor">|</span>
        </div>
    </div>

    <script>
        // --- 1. TẠO TRÁI TIM BAY ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤'; // Bạn có thể thay bằng các icon khác như 💕, 💖
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's'; // Từ 5s - 10s
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.getElementById('heart-spawn').appendChild(heart);

            setTimeout(() => { heart.remove(); }, 10000);
        }
        setInterval(createHeart, 400); // Cứ 0.4s tạo 1 trái tim mới

        // --- 2. HIỆU ỨNG GÕ CHỮ ---
        const modelViewer = document.querySelector('#my-model');
        const typingTextEl = document.querySelector('#typing-text');
        const cursorEl = document.querySelector('.cursor');

        // Thêm icon ❤️ ở cuối câu
        const message = "Gửi công chúa nhỏ, nhớ giữ sức khỏe cho bản thân đấy, ăn uống đàng hoàng,\ntới kỳ thì nhớ giữ ấm, đừng làm việc nặng giữ sức nhé.\nBất cứ lúc nào cũng có thể gọi tui.\nThương cô ❤️";
        const typingSpeed = 80; 
        let charIndex = 0;

        function startTyping() {
            if (charIndex < message.length) {
                typingTextEl.textContent += message.charAt(charIndex);
                charIndex++;
                setTimeout(startTyping, typingSpeed);
            } else {
                setTimeout(() => { cursorEl.style.display = 'none'; }, 2000);
            }
        }

        modelViewer.addEventListener('load', () => {
            setTimeout(startTyping, 1200);
        });
    </script>
</body>
</html>
